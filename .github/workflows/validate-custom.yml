name: Validate Custom

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hassfest dependencies
        run: pip install homeassistant --quiet

      - name: Validate manifest.json
        run: |
          python3 - <<'EOF'
          import json, sys, re
          required = ["domain","name","version","documentation","issue_tracker","codeowners"]
          with open("custom_components/medication_tracker/manifest.json") as f:
              m = json.load(f)
          missing = [k for k in required if k not in m]
          if missing:
              print(f"❌ Missing manifest keys: {missing}")
              sys.exit(1)
          version = m["version"]
          if not re.match(r'^\d{4}\.\d+\.\d+\.\d+$', version):
              print(f"❌ Version '{version}' does not match expected format YYYY.M.P.B (e.g. 2026.3.7.0)")
              sys.exit(1)
          print(f"✅ manifest.json valid — version {version}")
          EOF

      - name: Check hacs.json
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("hacs.json") as f:
              h = json.load(f)
          if "name" not in h:
              print("❌ hacs.json missing 'name'")
              sys.exit(1)
          print(f"✅ hacs.json valid — {h['name']}")
          EOF

      - name: Lint Python files
        run: |
          pip install flake8 --quiet
          flake8 custom_components/medication_tracker/ --max-line-length=120 --ignore=E501,W503

      - name: Check brand icon exists
        run: |
          if [ ! -f "custom_components/medication_tracker/brand/icon.png" ]; then
            echo "⚠️  Warning: brand/icon.png not found — required for HACS submission"
          else
            echo "✅ Brand icon found"
          fi
